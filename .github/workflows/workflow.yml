name: Validador vocabulario RAE

on:
  workflow_dispatch:      # botón manual "Run workflow" en la pestaña Actions
  # schedule:
  #   - cron: '0 6 * * *' # descomenta para correr automáticamente (hora UTC)

jobs:
  procesar:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 horas, el máximo por job

    strategy:
      fail-fast: false     # si un TXT falla, los otros 6 siguen corriendo
      max-parallel: 7       # tope para no golpear el DLE con demasiadas requests simultáneas
      matrix:
        archivo:
          # - vocabulario_general_01.txt
          # - vocabulario_general_02.txt
          # - vocabulario_general_03.txt
          # - vocabulario_general_04.txt
          - vocabulario_general_05.txt
          - vocabulario_general_06.txt
          # - vocabulario_general_07.txt
          # ↑ descomenta el resto una vez validada la prueba con _01

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends /tmp/chrome.deb

      - name: Instalar dependencias Python
        run: |
          pip install -q -U selenium gspread google-auth google-api-python-client

      - name: Ejecutar validador para ${{ matrix.archivo }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CARPETA_ID: ${{ secrets.CARPETA_ID }}
        run: |
          python validador_vocabulario_rae.py --archivo "${{ matrix.archivo }}"
